                      - text: Troubleshoot performance issues faster with the new Grafana Assistant integration for Database Observability
                      - img [ref=e321]
                  - generic [ref=e323]: So your database is slow. Now what?Grafana Cloud Database Observability already gives you visibility into your SQL queries with RED metrics, individual execution samples, wait event breakdowns, table schemas, and visual explain plans. But visibility is just the starting point.
              - 'article "Faster fixes, less context sharing: how Grafana Assistant learns your infrastructure before you even ask" [ref=e324]':
                - link [ref=e325] [cursor=pointer]:
                  - /url: https://grafana.com/blog/how-grafana-assistant-learns-your-infrastructure-before-you-even-ask/
                  - img [ref=e326]
                - generic [ref=e327]:
                  - time [ref=e328]: Apr 30
                  - 'heading "Faster fixes, less context sharing: how Grafana Assistant learns your infrastructure before you even ask" [level=1] [ref=e329]':
                    - 'link "Faster fixes, less context sharing: how Grafana Assistant learns your infrastructure before you even ask" [ref=e330] [cursor=pointer]':
                      - /url: https://grafana.com/blog/how-grafana-assistant-learns-your-infrastructure-before-you-even-ask/
                      - text: "Faster fixes, less context sharing: how Grafana Assistant learns your infrastructure before you even ask"
                      - img [ref=e331]
                  - generic [ref=e333]: When an unexpected alert fires these days, most engineers' first move is to ask their AI assistant for help.You ask why your checkout service is slow and the assistant gets to work, but it can't get any meaningful insights—at least not quickly—without the proper guidance. So, the next thing you know you're sharing deals about your existing data sources, the services you have running, how they connect, which labels and metrics matter, and on and on.
              - article "Get observability in the terminal, for you and your agents, with the gcx CLI tool" [ref=e334]:
                - link [ref=e335] [cursor=pointer]:
                  - /url: https://grafana.com/blog/get-observability-in-the-terminal-for-you-and-your-agents-with-the-gcx-cli-tool/
                  - img [ref=e336]
                - generic [ref=e337]:
                  - time [ref=e338]: Apr 28
                  - heading "Get observability in the terminal, for you and your agents, with the gcx CLI tool" [level=1] [ref=e339]:
                    - link "Get observability in the terminal, for you and your agents, with the gcx CLI tool" [ref=e340] [cursor=pointer]:
                      - /url: https://grafana.com/blog/get-observability-in-the-terminal-for-you-and-your-agents-with-the-gcx-cli-tool/
                      - text: Get observability in the terminal, for you and your agents, with the gcx CLI tool
                      - img [ref=e341]
                  - generic [ref=e343]: The way you write code is changing, which means the way you observe your systems and respond to issues needs to change, too.Engineers today spend much of their day working via command line, as agentic tools like Cursor and Claude Code have become highly effective at handling many day-to-day engineering tasks. This greatly accelerates code generation, but it doesn't solve for the context switching that comes when you have to jump into another tool that's not part of this new, faster workflow.
              - 'article "Secure performance testing at scale: Introducing secrets management for Grafana Cloud k6" [ref=e344]':
                - link [ref=e345] [cursor=pointer]:
                  - /url: https://grafana.com/blog/introducing-secrets-management-for-grafana-cloud-k6/
                  - img [ref=e346]
                - generic [ref=e347]:
                  - time [ref=e348]: Apr 28
                  - 'heading "Secure performance testing at scale: Introducing secrets management for Grafana Cloud k6" [level=1] [ref=e349]':
                    - 'link "Secure performance testing at scale: Introducing secrets management for Grafana Cloud k6" [ref=e350] [cursor=pointer]':
                      - /url: https://grafana.com/blog/introducing-secrets-management-for-grafana-cloud-k6/
                      - text: "Secure performance testing at scale: Introducing secrets management for Grafana Cloud k6"
                      - img [ref=e351]
                  - generic [ref=e353]: To simulate real user behavior, performance tests often rely on API keys, tokens, or credentials to interact with real systems. But as your testing suite grows, this sensitive data can start to sprawl across scripts, configs, and environments, increasing the risk of exposure and making tests harder to manage and maintain.
