                  - /url: https://grafana.com/blog/customize-preconfigured-views-for-aws-azure-and-google-cloud-with-cloud-provider-observability-in-grafana-cloud/
                  - img [ref=e356]
                - generic [ref=e357]:
                  - time [ref=e358]: Apr 27
                  - heading "Customize preconfigured views for AWS, Azure, and Google Cloud with Cloud Provider Observability in Grafana Cloud" [level=1] [ref=e359]:
                    - link "Customize preconfigured views for AWS, Azure, and Google Cloud with Cloud Provider Observability in Grafana Cloud" [ref=e360] [cursor=pointer]:
                      - /url: https://grafana.com/blog/customize-preconfigured-views-for-aws-azure-and-google-cloud-with-cloud-provider-observability-in-grafana-cloud/
                      - text: Customize preconfigured views for AWS, Azure, and Google Cloud with Cloud Provider Observability in Grafana Cloud
                      - img [ref=e361]
                  - generic [ref=e363]: Part of what makes Cloud Provider Observability in Grafana Cloud really useful is that it gives you prebuilt dashboards and drill-downs for AWS, Azure, and Google Cloud. Out of the box you get service overviews, instance-level views, and quick links to explore your data.
              - 'article "Introducing Pyroscope 2.0: faster, more cost-effective continuous profiling at scale" [ref=e364]':
                - link [ref=e365] [cursor=pointer]:
                  - /url: https://grafana.com/blog/pyroscope-2-0-release/
                  - img [ref=e366]
                - generic [ref=e367]:
                  - time [ref=e368]: Apr 21
                  - 'heading "Introducing Pyroscope 2.0: faster, more cost-effective continuous profiling at scale" [level=1] [ref=e369]':
                    - 'link "Introducing Pyroscope 2.0: faster, more cost-effective continuous profiling at scale" [ref=e370] [cursor=pointer]':
                      - /url: https://grafana.com/blog/pyroscope-2-0-release/
                      - text: "Introducing Pyroscope 2.0: faster, more cost-effective continuous profiling at scale"
                      - img [ref=e371]
                  - generic [ref=e373]: Continuous profiling is becoming a standard part of the observability stack, and for good reason. It's the only signal that tells you why your code is slow or expensive, not just that it is. Metrics tell you CPU usage is high. Logs tell you a request was slow. Traces tell you which service is the bottleneck. But only a profile tells you which function, on which line, is burning the cycles.
              - 'article "Introducing o11y-bench: an open benchmark for AI agents running observability workflows" [ref=e374]':
                - link [ref=e375] [cursor=pointer]:
                  - /url: https://grafana.com/blog/o11y-bench-open-benchmark-for-observability-agents/
                  - img [ref=e376]
                - generic [ref=e377]:
                  - time [ref=e378]: Apr 21
                  - 'heading "Introducing o11y-bench: an open benchmark for AI agents running observability workflows" [level=1] [ref=e379]':
                    - 'link "Introducing o11y-bench: an open benchmark for AI agents running observability workflows" [ref=e380] [cursor=pointer]':
                      - /url: https://grafana.com/blog/o11y-bench-open-benchmark-for-observability-agents/
                      - text: "Introducing o11y-bench: an open benchmark for AI agents running observability workflows"
                      - img [ref=e381]
                  - generic [ref=e383]: Evaluating agents is hard. Verifying observability tasks is harder.Yes, AI agents have gotten dramatically and quantifiably better at coding and tool use, but observability presents a different kind of challenge. In a real incident, the hard part is rarely just writing a query. It's deciding which signal matters, figuring out whether a spike is noise or symptom, correlating metrics with logs and traces, and sometimes making a change in Grafana without breaking the dashboard another engineer depends on.
